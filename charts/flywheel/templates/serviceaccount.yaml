{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flywheel.serviceAccountName" . }}
  labels:
    {{- include "flywheel.labels" . | nindent 4 }}
  {{- with (mergeOverwrite (dict) .Values.commonAnnotations .Values.serviceAccount.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
