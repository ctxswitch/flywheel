name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Application version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      chart_bump:
        description: Helm chart version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump & Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate versions
        id: version
        shell: bash
        run: |
          bump_version() {
            local current="$1"
            local bump="$2"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$current"

            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
              *) echo "unsupported bump: $bump" >&2; return 1 ;;
            esac

            printf '%s.%s.%s\n' "$major" "$minor" "$patch"
          }

          current=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          chart_current=$(sed -n 's/^version: *//p' charts/flywheel/Chart.yaml | head -1)
          new=$(bump_version "$current" "${{ inputs.bump }}")
          chart_new=$(bump_version "$chart_current" "${{ inputs.chart_bump }}")

          {
            echo "current=$current"
            echo "new=$new"
            echo "chart_current=$chart_current"
            echo "chart_new=$chart_new"
          } >> "$GITHUB_OUTPUT"
          echo "Application: $current -> $new"
          echo "Helm chart: $chart_current -> $chart_new"

      - name: Update Cargo package
        run: |
          sed -i '0,/^version = ".*"/s//version = "${{ steps.version.outputs.new }}"/' Cargo.toml
          cargo update -p flywheel --precise '${{ steps.version.outputs.new }}'

      - name: Update Helm chart
        run: |
          sed -i 's/^version:.*/version: ${{ steps.version.outputs.chart_new }}/' charts/flywheel/Chart.yaml
          sed -i 's/^appVersion:.*/appVersion: "${{ steps.version.outputs.new }}"/' charts/flywheel/Chart.yaml

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock charts/flywheel/Chart.yaml
          git commit -m "chore(release): bump to v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --tags
