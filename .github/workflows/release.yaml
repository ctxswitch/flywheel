name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Bump Version"]
    types:
      - completed

permissions:
  contents: write
  packages: write
  pages: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  resolve-tag:
    name: Resolve Tag
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          tag=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$tag" ]; then
            echo "::error::No version tag found"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

  ci:
    name: CI
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets

  docker:
    name: Docker
    needs: [resolve-tag, ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Helm Chart
    needs: [resolve-tag, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm lint charts/flywheel --strict
          mkdir -p .helm-packages
          helm package charts/flywheel -d .helm-packages

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repository index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          touch gh-pages/.nojekyll
          if [ -f gh-pages/index.yaml ]; then
            helm repo index gh-pages --url https://ctxswitch.github.io/flywheel --merge gh-pages/index.yaml
          else
            helm repo index gh-pages --url https://ctxswitch.github.io/flywheel
          fi

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): publish chart for ${{ needs.resolve-tag.outputs.tag }}"
          fi
          git push

  release:
    name: GitHub Release
    needs: [resolve-tag, docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Read chart version
        id: chart
        run: |
          version=$(sed -n 's/^version: *//p' charts/flywheel/Chart.yaml | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            log=$(git log --pretty=format:"- %s (%h)" '${{ needs.resolve-tag.outputs.tag }}')
          else
            log=$(git log --pretty=format:"- %s (%h)" "${prev_tag}..${{ needs.resolve-tag.outputs.tag }}")
          fi

          {
            echo "changelog<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: false
          body: |
            ## Container Image

            ```text
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}
            ```

            ## Helm Chart

            ```text
            helm repo add flywheel https://ctxswitch.github.io/flywheel
            helm repo update
            helm upgrade --install flywheel flywheel/flywheel \
              --version ${{ steps.chart.outputs.version }} \
              --namespace cache \
              --create-namespace
            ```

            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
