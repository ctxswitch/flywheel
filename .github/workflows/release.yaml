name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      release: ${{ steps.tag.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag="v${version}"

          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "Tag $tag already exists; there is nothing to release."
              echo "release=false" >> "$GITHUB_OUTPUT"
            else
              echo "release=true" >> "$GITHUB_OUTPUT"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

  ci:
    name: CI
    needs: [resolve-tag]
    if: needs.resolve-tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets

  docker:
    name: Docker
    needs: [resolve-tag, ci]
    if: needs.resolve-tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: ${{ vars.DOCKER_BUILD_CLOUD_ENDPOINT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ctxsh/flywheel:${{ needs.resolve-tag.outputs.tag }}
            ctxsh/flywheel:latest

  helm:
    name: Helm Chart
    needs: [resolve-tag, docker]
    if: needs.resolve-tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm lint charts/flywheel --strict
          mkdir -p .helm-packages
          helm package charts/flywheel -d .helm-packages

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repository index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          touch gh-pages/.nojekyll
          if [ -f gh-pages/index.yaml ]; then
            helm repo index gh-pages --url https://ctxswitch.github.io/flywheel --merge gh-pages/index.yaml
          else
            helm repo index gh-pages --url https://ctxswitch.github.io/flywheel
          fi

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): publish chart for ${{ needs.resolve-tag.outputs.tag }}"
          fi
          git push

  release:
    name: GitHub Release
    needs: [resolve-tag, docker, helm]
    if: needs.resolve-tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Read chart version
        id: chart
        run: |
          version=$(sed -n 's/^version: *//p' charts/flywheel/Chart.yaml | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            log=$(git log --pretty=format:"- %s (%h)" '${{ needs.resolve-tag.outputs.tag }}')
          else
            log=$(git log --pretty=format:"- %s (%h)" "${prev_tag}..${{ needs.resolve-tag.outputs.tag }}")
          fi

          {
            echo "changelog<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: false
          body: |
            ## Docker Image

            ```text
            docker pull ctxsh/flywheel:${{ needs.resolve-tag.outputs.tag }}
            ```

            ## Helm Chart

            ```text
            helm repo add flywheel https://ctxswitch.github.io/flywheel
            helm repo update
            helm upgrade --install flywheel flywheel/flywheel \
              --version ${{ steps.chart.outputs.version }} \
              --namespace cache \
              --create-namespace
            ```

            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
